<!doctype html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/x-icon" href="https://risoluto.4effect.com.br/faviconLogo.png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/header.css" />
  <link rel="stylesheet" href="css/sidebar.css" />
  <link rel="stylesheet" href="css/content.css" />

  <title>Risoluto</title>
</head>

<body>
  <div class="layout">
    <div class="main-header">
      <div class="menu">
        <i class="fa-solid fa-bars" id="sidebarToggler"></i>
        <div class="logo-container">
          <a href="#"><img src="https://risoluto.4effect.com.br/content/6431367a41f82eb26218bc7eacbb597b.png"
              width="200px;" alt="Logo" />
          </a>
        </div>
      </div>
      <div class="empresa-container">
        <span>Prefeitura de Florianópolis</span>
      </div>
      <div class="header-user-container">
        <span class="clock">00:00:00</span>
        <img width="40" height="40" src="https://img.icons8.com/ios-filled/50/ffffff/fingerprint.png" alt="fingerprint"
          class="fingerprint" />
        <i class="user fa fa-user"></i>
      </div>
    </div>

    <div class="sidebar">
      <div class="sidebar-menu">
        <div class="user-info">
          <i class="user2 fa fa-user" id="borderColor"></i>
          <div class="name-job-title">
            <span>GUILHERME GABRIEL</span>
            <p>0107-ESTAGIARIO</p>
          </div>
        </div>

        <div class="user-status">
          <select name="status" id="Status">
            <option value="Online">Online</option>
            <option value="Ausente">Ausente</option>
            <option value="Ocupado">Ocupado</option>
          </select>
        </div>

        <div class="face-in">
          <a href="facein/facein.html"><i class="fa-brands fa-facebook-f"></i>
            <span>Face-In</span>
          </a>
        </div>
        <div class="ponto">
          <a href="ponto/gerenciamento-ponto.html"><img class="sidebar-fingerprint" width="30" height="30"
              src="https://img.icons8.com/ios-filled/50/0c424e/fingerprint.png" alt="fingerprint" />
            <span>Ponto</span>
          </a>
        </div>
        <div class="game-in">
          <a href=""><img width="30" height="30" src="https://img.icons8.com/sf-black-filled/64/0d5965/controller.png"
              alt="controller" />
            <span>GameIn</span>
          </a>
        </div>
        <div class="consulta-lancamento">
          <a href="">
            <img width="30" height="30" src="https://img.icons8.com/ios/50/0d5965/printer-door-open.png"
              alt="printer-door-open" />
            <span>Consulta Lançamento</span>
          </a>
        </div>
      </div>
    </div>

    <main class="content">

      <div class="content-header">
        <a href="/"><i class="fa-solid fa-house"></i></a>
        <span> / </span>
        <span>Risoluto</span>
      </div>

      <div class="content-main">

        <div class="fg-wrapper">
          <div class="FaceIn">
            <a href="facein/facein.html"><i class="fa-brands fa-facebook-f">
              </i>
              <span>FACE-IN</span>
            </a>
          </div>
        </div>

        <div class="fg-wrapper">
          <a href="">
            <div class="GameIn">
              <i class="fa-solid fa-gamepad"></i>
              </i>
              <span>GAME-IN</span>
          </a>
        </div>
      </div>

  </div>

  <footer class="content-footer">
    <span>© Copyright 2026 <a href="#">Risoluto Tecnologia</a>. All rights reserved.</span>
  </footer>

  </main>

  </div>
  <script src="js/script.js"></script>
</body>


</html>
